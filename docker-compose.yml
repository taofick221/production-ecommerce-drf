services:

  web:
    build: .
    container_name: corecommerce_web
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: always
  db:
    image: postgres:16
    container_name: corecommerce_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: corecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: taofick45418
    restart: always
  redis:
    image: redis:7
    container_name: corecommerce_redis
    restart: always
  
  celery:
    build: .
    container_name: corecommerce_celery
    command: celery -A config worker -l info
    depends_on:
      - redis
      - db
    env_file:
      - .env
    restart: always
volumes:
  postgres_data:
    